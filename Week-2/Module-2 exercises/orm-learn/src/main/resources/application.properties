# -------------------------------------------------------
# Spring Framework and application-level log settings
# -------------------------------------------------------
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logging - shows executed queries and bound parameters
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Custom console log pattern for readable output
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# -------------------------------------------------------
# MySQL datasource configuration
# -------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# -------------------------------------------------------
# Hibernate behaviour settings
# validate => checks existing schema; throws error on mismatch
# update   => auto-creates missing tables/columns
# create   => drops and recreates every startup
# create-drop => same as create but drops on shutdown
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.show-sql=true
